<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蒝蒝与奶龙：星桥约定</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <div id="start-screen" class="overlay visible">
      <div class="title-card">
        <p class="eyebrow">互动视觉小说 Galgame</p>
        <h1>蒝蒝与奶龙：星桥约定</h1>
        <p class="subtitle">和蒝蒝一起，在夜色与星光中，写下你和奶龙的专属结局。</p>
        <p class="hint">提示：`Enter/空格` 继续，`A` 自动，`S` 跳过，`M` 静音</p>
        <div class="start-actions">
          <button id="start-btn" class="primary">开始新故事</button>
          <button id="continue-btn">继续上次进度</button>
          <button id="open-ending-btn">查看结局图鉴</button>
        </div>
      </div>
    </div>

    <div id="history-modal" class="overlay">
      <div class="modal-card">
        <h2>对话回溯</h2>
        <div id="history-list"></div>
        <button class="modal-close" data-close="history-modal">关闭</button>
      </div>
    </div>

    <div id="ending-modal" class="overlay">
      <div class="modal-card ending-card">
        <h2>结局图鉴</h2>
        <p class="subtitle">已解锁结局会永久保存</p>
        <div id="ending-list"></div>
        <button class="modal-close" data-close="ending-modal">关闭</button>
      </div>
    </div>

    <main id="game-stage">
      <div id="bg-layer">
        <img id="bg-image" alt="背景">
        <div class="bg-vignette"></div>
      </div>

      <section id="character-stage">
        <img id="hero-sprite" alt="蒝蒝立绘">
        <img id="dragon-sprite" alt="奶龙立绘">
      </section>

      <header id="top-ui">
        <div id="stat-bar">
          <span>羁绊：<b id="stat-bond">0</b></span>
          <span>勇气：<b id="stat-courage">0</b></span>
          <span>灵感：<b id="stat-wonder">0</b></span>
        </div>
        <div id="controls">
          <button id="auto-btn">自动</button>
          <button id="skip-btn">跳过</button>
          <button id="save-btn">存档</button>
          <button id="load-btn">读档</button>
          <button id="history-btn">回溯</button>
          <button id="ending-btn">图鉴</button>
          <button id="mute-btn">静音</button>
          <label class="volume-wrap">
            音量
            <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.55">
          </label>
        </div>
      </header>

      <section id="dialogue-panel" tabindex="0">
        <div id="speaker"></div>
        <div id="dialogue-text"></div>
        <div id="choice-container"></div>
        <div id="next-hint">点击对话框或按 Enter 继续</div>
      </section>
    </main>

    <div id="toast"></div>
    <audio id="bgm" src="./assets/audio/bgm.flac" loop preload="auto"></audio>
  </div>

  <script src="./game.js"></script>
</body>
</html>
